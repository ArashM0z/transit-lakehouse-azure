version: 2
updates:

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
      include: scope

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      python-dev:
        patterns:
          - "ruff*"
          - "mypy*"
          - "pytest*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(docker)"
      include: scope

  - package-ecosystem: terraform
    directory: /terraform/environments/dev
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(tf)"
      include: scope

  - package-ecosystem: terraform
    directory: /terraform/environments/prod
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(tf)"
      include: scope

# end of dependabot config
