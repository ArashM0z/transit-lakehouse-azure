{{- if .Values.podDisruptionBudget.enabled -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "transit-lakehouse.fullname" . }}
  labels: {{- include "transit-lakehouse.labels" . | nindent 4 }}
spec:
  {{- with .Values.podDisruptionBudget.minAvailable }}
  minAvailable: {{ . }}
  {{- end }}
  selector:
    matchLabels: {{- include "transit-lakehouse.selectorLabels" . | nindent 6 }}
{{- end }}
