# Cross-platform task runner alternative to Makefile.
# Install: https://taskfile.dev/installation/
# Run:     task --list

version: "3"

vars:
  COMPOSE: docker compose

tasks:
  default:
    desc: List available tasks
    cmd: task --list

  up:
    desc: Bring up the local dev stack
    cmd: "{{.COMPOSE}} up -d --build"

  down:
    desc: Tear down the local dev stack
    cmd: "{{.COMPOSE}} down -v"

  restart:
    desc: Restart the stack
    cmds:
      - task: down
      - task: up

  ps:
    desc: Show running services
    cmd: "{{.COMPOSE}} ps"

  logs:
    desc: Tail logs
    cmd: "{{.COMPOSE}} logs -f --tail=100"

  seed:
    desc: Seed reference data (GTHA stations, lines, calendar)
    cmd: "{{.COMPOSE}} run --rm app python -m src.ingestion.seed_reference_data"

  stream:
    desc: Start the synthetic AFC tap stream generator
    cmd: "{{.COMPOSE}} run --rm app python -m src.ingestion.afc_tap_generator"

  ingest-bronze:
    desc: Run bronze ingestion
    cmd: "{{.COMPOSE}} run --rm app python -m src.ingestion.bronze_ingest"

  dbt-build:
    desc: dbt build (compile + run + test) across silver + gold
    cmd: "{{.COMPOSE}} run --rm dbt build --profiles-dir /workspace/dbt/profiles --project-dir /workspace/dbt"

  test:
    desc: Run all tests
    cmds:
      - pytest tests/unit -q
      - pytest tests/integration -q
      - pytest tests/data_quality -q

  lint:
    desc: Lint everything
    cmds:
      - ruff check src tests
      - mypy --strict src
      - sqlfluff lint dbt/models

  format:
    desc: Auto-format source
    cmds:
      - ruff format src tests
      - ruff check --fix src tests
      - sqlfluff fix dbt/models || true

  tf-plan:
    desc: terraform plan for dev
    dir: terraform/environments/dev
    cmds:
      - terraform fmt -recursive
      - terraform init
      - terraform validate
      - terraform plan -out=plan.tfplan
# Taskfile is the cross-platform alternative to the Makefile for Windows-first devs.

# tab completion: see https://taskfile.dev/installation/
