name: transit-lakehouse

services:

  postgres:
    image: postgres:16-alpine
    container_name: lakehouse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lakehouse}
      POSTGRES_USER: ${POSTGRES_USER:-lakehouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lakehouse}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lakehouse} -d ${POSTGRES_DB:-lakehouse}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: lakehouse-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin}; do sleep 1; done;
      /usr/bin/mc mb -p local/${MINIO_BUCKET:-lakehouse} || true;
      /usr/bin/mc mb -p local/${MINIO_BUCKET:-lakehouse}/bronze || true;
      /usr/bin/mc mb -p local/${MINIO_BUCKET:-lakehouse}/silver || true;
      /usr/bin/mc mb -p local/${MINIO_BUCKET:-lakehouse}/gold || true;
      /usr/bin/mc anonymous set download local/${MINIO_BUCKET:-lakehouse};
      exit 0;
      "

  redpanda:
    image: redpandadata/redpanda:v24.3.4
    container_name: lakehouse-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr=internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr=redpanda:33145
      - --advertise-rpc-addr=redpanda:33145
      - --mode=dev-container
      - --smp=1
      - --default-log-level=info
    ports:
      - "19092:19092"
      - "18081:18081"
      - "18082:18082"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda-console:
    image: redpandadata/console:v2.8.0
    container_name: lakehouse-redpanda-console
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8079:8080"
    depends_on:
      redpanda:
        condition: service_healthy

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    container_name: lakehouse-mlflow
    restart: unless-stopped
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER:-lakehouse}:${POSTGRES_PASSWORD:-lakehouse}@postgres:5432/${POSTGRES_DB:-lakehouse}
      --default-artifact-root s3://${MINIO_BUCKET:-lakehouse}/mlflow
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: lakehouse-app
    restart: unless-stopped
    env_file: .env
    environment:
      MINIO_ENDPOINT: http://minio:9000
      KAFKA_BOOTSTRAP: redpanda:9092
      POSTGRES_HOST: postgres
      MLFLOW_TRACKING_URI: http://mlflow:5000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    volumes:
      - ./src:/workspace/src
      - ./tests:/workspace/tests
      - ./scripts:/workspace/scripts
      - ./dbt:/workspace/dbt
      - ./notebooks:/workspace/notebooks
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.8.2
    container_name: lakehouse-dbt
    profiles: ["tools"]
    working_dir: /workspace/dbt
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-lakehouse}
      POSTGRES_USER: ${POSTGRES_USER:-lakehouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lakehouse}
    volumes:
      - ./dbt:/workspace/dbt
    depends_on:
      postgres:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.117.0
    container_name: lakehouse-otel
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./scripts/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus metrics

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: lakehouse-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./scripts/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: lakehouse-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./scripts/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./scripts/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: transit-lakehouse
