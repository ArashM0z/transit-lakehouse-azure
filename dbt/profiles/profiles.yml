transit_lakehouse:
  target: dev
  outputs:

    # Local dev — runs against the docker-compose Postgres.
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'postgres') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'lakehouse') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'lakehouse') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'lakehouse') }}"
      schema: dbt_dev
      threads: 4
      keepalives_idle: 0

    # CI — DuckDB profile so we can run dbt build with no external services.
    ci:
      type: duckdb
      path: "{{ env_var('DBT_DUCKDB_PATH', 'dbt/.duckdb/ci.duckdb') }}"
      threads: 2

    # Production — Azure Databricks SQL warehouse.
    prod:
      type: databricks
      host: "{{ env_var('DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}"
      token: "{{ env_var('DATABRICKS_TOKEN') }}"
      catalog: "{{ env_var('DATABRICKS_CATALOG', 'transit_lakehouse') }}"
      schema: dbt_prod
      threads: 8
